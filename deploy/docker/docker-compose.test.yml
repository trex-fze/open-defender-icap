services:
  smoke-tests:
    extends:
      file: docker-compose.yml
      service: odctl-runner
    command:
      - bash
      - -lc
      - |
        set -euo pipefail
        echo "Running database migrations..."
        odctl migrate run admin
        echo "Waiting for services before smoke test..."
        sleep 10
        odctl override list || true
        odctl smoke --profile compose
    depends_on:
      icap-adaptor:
        condition: service_started
      admin-api:
        condition: service_started

  web-admin:
    profiles: ["dev"]

  elasticsearch:
    profiles: ["dev"]

  kibana:
    profiles: ["dev"]

  prometheus:
    profiles: ["dev"]
