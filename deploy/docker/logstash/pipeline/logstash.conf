input {
  beats {
    port => 5044
  }
}

filter {
  mutate {
    add_field => { "[od][source]" => "squid" }
  }
}

output {
  http {
    url => "${OD_INGEST_ENDPOINT:http://event-ingester:19100}/ingest/filebeat"
    http_method => "post"
    format => "json"
    content_type => "application/json"
    headers => ["X-Filebeat-Secret", "${OD_FILEBEAT_SECRET:changeme-ingest}"]
  }
  stdout {
    codec => rubydebug
  }
}
