groups:
  - name: stage6-alerts
    rules:
      - alert: CacheHitRatioLow
        expr: avg_over_time(cache_hit_ratio[5m]) < 0.9
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Cache hit ratio below 90%"
          description: "Average cache hit ratio over the last 5m is {{ $value }}"

      - alert: SquidToIcapLatencyHigh
        expr: histogram_quantile(0.95, sum(rate(squid_to_icap_latency_seconds_bucket[5m])) by (le)) > 0.5
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "ICAP adaptor latency p95 above 500ms"
          description: "p95 Squid → ICAP latency is {{ $value }}s"

      - alert: EventIngestFailures
        expr: increase(ingest_failures_total[5m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Event ingestion failures detected"
          description: "Bulk ingestion failures observed in the last 5 minutes"

      - alert: ReviewSlaBreaches
        expr: increase(review_sla_breached_total[15m]) > 5
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Review SLA breach rate high"
          description: "More than 5 review items breached SLA in the last 15 minutes"

  - name: stage8-llm-alerts
    rules:
      - alert: LlmProviderFailures
        expr: sum by (provider) (increase(llm_provider_failures_total[5m])) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "LLM provider {{ $labels.provider }} is failing"
          description: "{{ $value }} failures recorded over the last 5 minutes"

      - alert: LlmProviderTimeoutSpike
        expr: sum by (provider) (increase(llm_provider_timeouts_total[5m])) > 3
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "LLM provider {{ $labels.provider }} experiencing timeouts"
          description: "Timeouts exceeded threshold in the last 5 minutes"

      - alert: LlmProviderLatencyHigh
        expr: histogram_quantile(0.95, sum(rate(llm_provider_request_duration_seconds_bucket[5m])) by (provider, le)) > 4
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "LLM provider {{ $labels.provider }} latency p95 > 4s"
          description: "Monitor or failover to maintain SLA"

  - name: stage24-queue-alerts
    rules:
      - alert: LlmQueuePendingAgeHigh
        expr: histogram_quantile(0.95, sum(rate(llm_pending_age_seconds_bucket[10m])) by (le)) > 600
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "LLM pending age p95 above 10 minutes"
          description: "Classification pending requests are aging beyond queue SLO"

      - alert: LlmQueueProcessingStalled
        expr: rate(llm_jobs_started_total[10m]) > 0.1 and rate(llm_jobs_completed_total[10m]) < 0.01
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "LLM queue processing appears stalled"
          description: "Jobs are being consumed but completions are near zero"

      - alert: PageFetchQueueProcessingStalled
        expr: rate(page_fetch_jobs_started_total[10m]) > 0.1 and rate(page_fetch_jobs_completed_total[10m]) < 0.01
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Page-fetch queue processing appears stalled"
          description: "Page-fetch jobs are being consumed but completions are near zero"

      - alert: LlmDlqGrowthDetected
        expr: increase(llm_dlq_published_total[10m]) > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "LLM DLQ growth detected"
          description: "Dead-letter entries are increasing for llm-worker"

      - alert: PageFetchDlqGrowthDetected
        expr: increase(page_fetch_dlq_published_total[10m]) > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Page-fetch DLQ growth detected"
          description: "Dead-letter entries are increasing for page-fetcher"

  - name: stage24-auth-alerts
    rules:
      - alert: AdminAuthLoginFailuresHigh
        expr: increase(admin_auth_login_failure_total[10m]) > 20
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Admin auth login failures are elevated"
          description: "High failed login volume in the last 10 minutes"

      - alert: AdminAuthLockoutDetected
        expr: increase(admin_auth_lockout_total[10m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Admin auth lockout triggered"
          description: "At least one account lockout was triggered recently"

      - alert: AdminAuthRefreshFailuresHigh
        expr: increase(admin_auth_refresh_failure_total[10m]) > 10
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Admin auth refresh failures are elevated"
          description: "Refresh token exchanges are failing at elevated rate"
