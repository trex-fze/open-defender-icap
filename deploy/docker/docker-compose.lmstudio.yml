services:
  lmstudio:
    image: ghcr.io/lmstudio-ai/lms:latest
    container_name: lmstudio
    restart: unless-stopped
    environment:
      - LMSTUDIO_BIND=0.0.0.0
      - LMSTUDIO_PORT=1234
      - LMSTUDIO_MODEL=gpt-oss-120b
    command: ["--port", "1234", "--model", "${LMSTUDIO_MODEL:-gpt-oss-120b}" ]
    ports:
      - "1234:1234"
    volumes:
      - lmstudio-models:/root/.cache/lmstudio
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1234/v1/models"]
      interval: 30s
      timeout: 5s
      retries: 10

volumes:
  lmstudio-models:
