http_port 3128

icap_enable on
icap_service service_req reqmod_precache icap://icap-adaptor:1344/reqmod bypass=1
adaptation_access service_req allow all

__OD_SQUID_ALLOWED_CLIENT_ACLS__
acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl Safe_ports port 1025-65535
acl CONNECT method CONNECT

http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports
http_access allow localhost
http_access allow localnet
http_access deny all

__OD_SQUID_FOLLOW_XFF_RULES__

logformat open_defender %ts.%03tu %6tr %>a %Ss/%03>Hs %<st %rm %ru %un %Sh/%<A %mt "%{Forwarded}>h" "%{X-Forwarded-For}>h"
access_log stdio:/var/log/squid/access.log open_defender

visible_hostname squid
