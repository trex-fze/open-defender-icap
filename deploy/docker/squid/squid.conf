http_port 3128
http_port 3130 ssl-bump cert=/etc/squid/certs/server.pem key=/etc/squid/certs/server.key generate-host-certificates=on dynamic_cert_mem_cache_size=4MB
icap_enable on
icap_service service_req reqmod_precache icap://icap-adaptor:1344/reqmod bypass=1
adaptation_access service_req allow all

acl all src 0.0.0.0/0
acl step1 at_step SslBump1
acl step2 at_step SslBump2
acl step3 at_step SslBump3

ssl_bump peek step1
ssl_bump bump step2
ssl_bump terminate step3
sslproxy_cert_error allow all
sslproxy_flags DONT_VERIFY_PEER
http_access allow all

dns_v4_first on
visible_hostname squid
